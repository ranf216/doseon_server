<!DOCTYPE html>
<html>
    <head>
		<title>{{system}} {{environment}} - Log Analyzer</title>
		<link rel="shortcut icon" href="/favicon.ico?src=log_analyzer" />
		<script type="text/javascript" src="/public/jquery-1.8.2.mini.js"></script>
		<script type="text/javascript" src="/public/jquery.cookie.js"></script>
        <script src="{{socket_url}}/socket.io/socket.io.js"></script>

		<style type="text/css">
			html, body {height: 100%; width: 100%; margin: 0;  padding:0;}
			#outer {height: 100%; width: 100%; margin: 0;  padding:0;}
            #header {padding: 5px;}

			#content {position: absolute; bottom: 0; width: 100%; overflow: scroll; font: 16px "courier new";}
			#logout {background-color: #f7ae66; border: #df7002 2px solid; font-weight: bold; cursor: pointer; {{enable_system_login}} }

            td {padding-left: 20px;}
            .alalyze_option {display: inline-block; border: solid 1px black; padding: 5px;}
            .alalyze_option_title {padding-bottom: 5px; font-weight: bold;}
            .date {width: 130px;}
            .user_param {width: 260px;}
            .log_table {width: 120px;}
            .row_id {width: 320px;}
            .request {width: 200px;}
            .substring {width: 400px;}
            .lines {width: 80px;}
            .alalyze_option_title span {font-weight: normal; padding-left: 20px;}
            .check {padding-right: 5px;}
            .rc_error {color: red;}
            .current_values {background-color: #ffefd5;}
            .Insert_values {background-color: lightblue;}
            .Delete_values {background-color: #ffb6c1;}
            .Update_values0 {background-color: #ffffff;}
            .Update_values1 {background-color: #eeeeee;}
            .values_title {font-weight: bold;}
            .update_row_sep {border-bottom: #444444 1px solid;}
            .update_val_sep {border-bottom: #aaaaaa 1px solid;}

            .spacer1 {width: 1px; display: inline-block;}
            .spacer25 {width: 25px; display: inline-block;}
			.spacer90 {width: 90px; display: inline-block;}
            .spacer120 {width: 120px; display: inline-block;}
			.inline_spacer {width: 100px; display: inline-block;}
			.vspacer {font-size: 1px; height: 6px;}
            .large_vspacer {font-size: 1px; height: 20px;}

			.type_REQUEST {color: #800000;}
			.type_RESPONSE {color: #004000;}
			.type_FAILED_RESPONSE {color: #ff0000;}
			.type_ERROR {color: #ff0000;}
			.type_WARNING {color: #ff8000;}
			.type_INFO {color: #0000ff;}
			.type_DEBUG {color: #00a000;}
			.type_{{project}} {color: #7137f7;}
			.simple_data {cursor: default;}
		</style>

        <script type="text/javascript">
			$(document).ready(function()
			{
				const element = document.getElementById("inner_fixed");
				const observer = new ResizeObserver(entries =>
				{
					for (let entry of entries)
					{
						console.log('Height changed to', entry.contentRect.height);
						$("#content").css("top", entry.contentRect.height);
						// Your callback here
					}
				}).observe(element);


			});

            function clearAllMessage()
            {
                $("#content").html("");
            }

            function appendLine(line)
            {
                $("#content").append(line);
                $('#content').scrollTop($('#content')[0].scrollHeight);
            }

            function analyzeOverload()
            {
                clearAllMessage();

                makeApiCall({"#request": "System/analyze_logs", "token": jQuery.cookie("system_token"), "date": $("#date").val()}, rc =>
                {
                    let content = `<table cellpadding="5" cellspacing="0" border="0">`;

                    if (rc.rc == 0)
                    {
                        if (rc.calls.length == 0)
                        {
                            content += `<tr><td>No results</td></tr>`;
                        }

                        rc.calls.forEach(call =>
                        {
                            content += `<tr><td>${call.datetime}</td><td>${call.ip_address}</td><td>${call.request_name}</td><td>${call.num_of_calls}</td></tr>`;
                        });
                    }
                    else
                    {
                        content += `<tr><td class="rc_error">[${rc.rc}] ${rc.message}</td></tr>`;
                    }

                    content += `</table>`;

                    appendLine(content);
                });
            }

            function query()
            {
                const substring = $("#substring").val();
                const lines = $("#lines").val();
                const date_from = $("#date_from").val();
                const date_to = $("#date_to").val();
                const request = $("#request").val();
                const chk_Rq = $("#chk_Rq").prop("checked");
                const chk_Rs = $("#chk_Rs").prop("checked");
                const chk_Otr = $("#chk_Otr").prop("checked");
                const chk_ERR = $("#chk_ERR").prop("checked");
                const chk_RCE = $("#chk_RCE").prop("checked");

                clearAllMessage();

                makeApiCall({"#request": "System/query_logs", "token": jQuery.cookie("system_token"),
                            "substring": substring, "lines": lines, "date_from": date_from, "date_to": date_to, "request": request,
                            "set_request": chk_Rq, "set_response": chk_Rs, "set_other": chk_Otr, "is_error": chk_ERR, "is_rc_error": chk_RCE}, rc =>
                {
                    let content = `<table cellpadding="5" cellspacing="0" border="0">`;

                    if (rc.rc == 0)
                    {
                        if (rc.lines.length == 0)
                        {
                            content += ("<tr><td>No results</td></tr>");
                        }

                        rc.lines.forEach(call =>
                        {
                            let isErr = (call.type == "RESPONSE" && call.text.indexOf("\"rc\":0") === -1);

                            content += `<tr class="type_${call.type}">
                                            <td class="simple_data">${call.datetime}</td>
                                            <td class="simple_data">${call.ip_address}</td>
                                            <td class="simple_data">${call.type}</td>
                                            <td class="simple_data">${call.request_name}</td>
                                            <td class="simple_data">${call.uid}</td>
                                            <td class="simple_data ${isErr ? "type_FAILED_RESPONSE" : ""}" onclick="copyToClipboard($(this).html())">${call.text}</td>
                                        </tr>`;
                        });
                    }
                    else
                    {
                        content += `<tr><td class="rc_error">[${rc.rc}] ${rc.message}</td></tr>`;
                    }

                    content += `</table>`;

                    appendLine(content);
                    $('#content').scrollTop(0);
                });
            }

            function getChangeLog()
            {
                clearAllMessage();
                let lineIndex = 0;

                makeApiCall({"#request": "System/get_record_change_log", "token": jQuery.cookie("system_token"), "table": $("#log_table").val(), "row_id": $("#row_id").val()}, rc =>
                {
                    let content = `<table cellpadding="5" cellspacing="0" border="0" width="100%">`;

                    if (rc.rc == 0)
                    {
                        if (rc.current_values)
                        {
                            content += `<tr class="current_values"><td class="values_title">Current Values</td></tr><tr class="current_values"><td> <table cellpadding="5" cellspacing="0" border="0">`;

                            Object.entries(rc.current_values).forEach(valsObj =>
                            {
                                const fieldName = valsObj[0];
                                const fieldVal = valsObj[1];

                                content += `<tr><td>${fieldName}:</td><td>${fieldVal}</td></tr>`;
                            });

                            content += `</table></td></tr>`;
                        }

                        rc.change_log.forEach(log =>
                        {
                            let valuesPostfix = "";
                            if (log.operation == "Update")
                            {
                                valuesPostfix = lineIndex;
                                lineIndex = (lineIndex == 0 ? 1 : 0);
                            }

                            content += `<tr class="${log.operation}_values${valuesPostfix}"><td class="values_title">${log.datetime} ${log.operation}</td></tr><tr class="${log.operation}_values${valuesPostfix}"><td> <table cellpadding="5" cellspacing="0" border="0">`;

                            if (log.operation == "Insert")
                            {
                                Object.entries(log.values).forEach(valsObj =>
                                {
                                    const fieldName = valsObj[0];
                                    const fieldVal = valsObj[1];

                                    content += `<tr><td>${fieldName}:</td><td>${fieldVal}</td></tr>`;
                                });
                            }
                            else if (log.operation == "Update")
                            {
                                let propIndex = 0;
                                const numOfProps = Object.keys(log.values).length;

                                Object.entries(log.values).forEach(valsObj =>
                                {
                                    propIndex++;
                                    const fieldName = valsObj[0];
                                    const {old: oldVal, new: newVal} = valsObj[1];

                                    const classRowSep = (propIndex == numOfProps ? "" : `class="update_row_sep"`);

                                    content += `<tr><td>${fieldName}:</td><td class="update_val_sep">Old:</td><td class="update_val_sep">${oldVal}</td></tr><tr><td ${classRowSep}></td><td ${classRowSep}>New:</td><td ${classRowSep}>${newVal}</td></tr>`;
                                });
                            }

                            content += `</table></td></tr>`;
                        });
                    }
                    else
                    {
                        content += `<tr><td class="rc_error">[${rc.rc}] ${rc.message}</td></tr>`;
                    }

                    content += `</table>`;

                    appendLine(content);
                    $('#content').scrollTop(0);
                });
            }

            function getUser()
            {
                clearAllMessage();

                makeApiCall({"#request": "System/get_user_by_param", "token": jQuery.cookie("system_token"), "user_param": $("#user_param").val()}, rc =>
                {
                    let content = `<table cellpadding="5" cellspacing="0" border="0">`;

                    if (rc.rc == 0)
                    {
                        content += `<tr><td>User Id</td><td>User Token</td><td>email</td><td>phone</td></tr>`;
                        content += `<tr><td>${rc.user_id}</td><td>${rc.user_token}</td><td>${rc.email}</td><td>${rc.phone}</td></tr>`;
                    }
                    else
                    {
                        content += `<tr><td class="rc_error">[${rc.rc}] ${rc.message}</td></tr>`;
                    }

                    content += `</table>`;

                    appendLine(content);
                });
            }

			function doOnLogout()
			{
				if (!confirm("Are you sure you want to logout?"))
				{
					return;
				}

                makeApiCall({"#request": "User/system_logout", "token": jQuery.cookie("system_token")}, rc =>
                {
                    jQuery.removeCookie("system_token");
                    window.location = "system_login/log_analyzer";
                });
			}

            function makeApiCall(request, callback)
            {
                $.ajax({
                        url: "{{api_url}}",
                        type: "POST",
                        data: JSON.stringify(request),
                        dataType: 'json',
                        headers: { 'Content-Type': 'application/json' },
                        success: function (json)
                        {
                            if (json.rc == undefined)
                            {
                                alert(JSON.stringify(json));
                                return;
                            }

                            callback(json);
                        },
                        error: function()
                        {
                            alert(arguments[0].responseText);
                        }
                });
            }

			function copyToClipboard(text)
			{
				if (navigator.clipboard)
				{
					navigator.clipboard.writeText(text)
					.then(() =>
					{
						showToast("Copied to clipboard!");
					})
					.catch(err =>
					{
						showToast("Failed to copy text", true);
					});
				}
				else
				{
					const textarea = document.createElement("textarea");
					textarea.value = text;
					document.body.appendChild(textarea);
					textarea.select();
					document.execCommand("copy");
					document.body.removeChild(textarea);
					showToast("Copied to clipboard!");
				}
			}

			function showToast(message, isErr = false)
			{
				const toast = document.createElement("div");
				toast.textContent = message;
				toast.style.position = "fixed";
				toast.style.bottom = "40px";
				toast.style.left = "50%";
				toast.style.transform = "translateX(-50%)";
				toast.style.background = (isErr ? "#A00000" : "#333333");
				toast.style.color = "#ffffff";
				toast.style.padding = "10px 20px";
				toast.style.borderRadius = "8px";
				toast.style.boxShadow = "0 2px 10px rgba(0,0,0,0.2)";
				toast.style.zIndex = "9999";
				toast.style.opacity = "0";
				toast.style.transition = "opacity 0.3s";

				document.body.appendChild(toast);

				// Fade in
				requestAnimationFrame(() =>
				{
					toast.style.opacity = "1";
				});

				// Remove after 1 second
				setTimeout(() =>
				{
					toast.style.opacity = "0";
					toast.addEventListener("transitionend", () =>
					{
						toast.remove();
					});
				}, 1000);
			}
        </script>
    </head>
    <body>
        <div id="outer">
            <div id="inner_fixed">
                <div id="header">
                    <div>{{getWebClientMessages}}{{getWebClientEnvironment}}</div>
                    <div><input type="button" id="logout" onclick="doOnLogout()" value="Logout" /></div>
                    <div class="large_vspacer"></div>
                    <div id="alalyze_options">
                        <div id="overload_control" class="alalyze_option">
                            <div class="alalyze_option_title">
                                Overload
                                <span class="spacer25"></span>
                                <button id="analyze_overload" onclick="analyzeOverload()">Analyze</button>
                            </div>
                            Date: <input type="text" id="date" class="date" />
                        </div>
                        <div id="log_control" class="alalyze_option">
                            <div class="alalyze_option_title">
                                Log
                                <span>Substring: <input type="text" id="substring" class="substring" /></span>
                                <span class="alalyze_option_title_end">Lines: <input type="text" id="lines" class="lines" value="100" /></span>
                                <div class="spacer90"></div>
                                <button id="query" onclick="query()">Query</button>
                            </div>
                            From: <input type="text" id="date_from" class="date" />
                            To: <input type="text" id="date_to" class="date" />
                            Request: <input type="text" id="request" class="reuqest" />
                            <input type="checkbox" id="chk_Rq" checked /><span style="cursor: default;" onclick="$('#chk_Rq').click()" class="check">Rq</span>
                            <input type="checkbox" id="chk_Rs" checked /><span style="cursor: default;" onclick="$('#chk_Rs').click()" class="check">Rs</span>
                            <input type="checkbox" id="chk_Otr" checked /><span style="cursor: default;" onclick="$('#chk_Otr').click()" class="check">Otr</span>
                            <input type="checkbox" id="chk_ERR" /><span style="cursor: default; color: red;" onclick="$('#chk_ERR').click()" class="check">ERR</span>
                            <input type="checkbox" id="chk_RCE"/><span style="cursor: default; color: red;" onclick="$('#chk_RCE').click()" class="check">RCE</span>
                        </div>
                        <div id="change_log_control" class="alalyze_option">
                            <div class="alalyze_option_title">
                                Record Change Log
                                <span>Table: <input type="text" id="log_table" class="log_table" /></span>
                                <span class="spacer1"></span>
                                <button id="get_user" onclick="getChangeLog()">get</button>
                            </div>
                            Row Id: <input type="text" id="row_id" class="row_id" />
                        </div>
                        <div id="user_token_control" class="alalyze_option">
                            <div class="alalyze_option_title">
                                User By Id or Token
                                <span class="spacer120"></span>
                                <button id="get_user" onclick="getUser()">get</button>
                            </div>
                            Param: <input type="text" id="user_param" class="user_param" />
                        </div>
                    </div>
                    <hr />
                </div>
            </div>
        
            <div id="content">
            </div>
        </div>
    </body>
</html>
