<!DOCTYPE html>
<html>
<head>
		<title>{{system}} {{environment}} - LogTail</title>
		<link rel="shortcut icon" href="/favicon.ico?src=logtail" />
		<script type="text/javascript" src="/public/jquery-1.8.2.mini.js"></script>
		<script type="text/javascript" src="/public/jquery.cookie.js"></script>

		<style type="text/css">
			html, body, #outer {height: 100%; width: 100%; margin: 0;  padding:0;}
			
			#content {position: absolute; bottom: 0; width: 100%; overflow: scroll; font: 16px "courier new";}

			.type_REQUEST {color: #800000;}
			.type_RESPONSE {color: #004000;}
			.type_FAILED_RESPONSE {color: #ff0000;}
			.type_ERROR {color: #ff0000;}
			.type_WARNING {color: #ff8000;}
			.type_INFO {color: #0000ff;}
			.type_DEBUG {color: #00a000;}
			.type_{{project}} {color: #7137f7;}

			.simple_data {cursor: default;}
			.filter_data {cursor: pointer;}
			.filter_data:hover {text-decoration: underline;}
			#content tr:hover {background: #f0f0f0; font-weight: bold;}
			.no_session {cursor: default;}
			.has_session {cursor: pointer; background: #ffffa0;}
			.checkTitle {cursor: default;}

			#REFRESH {font-size: 20px; color: #00aa00; height: 80px;}
			#RESET {font-size: 20px; color: red; height: 80px;}
			#lines {width: 60px; text-align: right;}
			#logout {margin-left: 150px; background-color: #f7ae66; border: #df7002 2px solid; font-weight: bold; cursor: pointer; {{enable_system_login}} }

			.spacer {width: 60px; display: inline;}
			.vspacer {font-size: 1px; height: 6px;}
		</style>

		<script type="text/javascript">
			var filterIp = "";
			var filterReq = "";
			var filterReqId = "";
			var filterTypes = new Array();
			var filterLines = {{limit}};
			var filterFileId = "";
			
			$(document).ready(function()
			{
				const element = document.getElementById("inner_fixed");
				const observer = new ResizeObserver(entries =>
				{
					for (let entry of entries)
					{
						console.log('Height changed to', entry.contentRect.height);
						$("#content").css("top", entry.contentRect.height);
						// Your callback here
					}
				}).observe(element);

				$("input[type='checkbox']").on("click", function(event)
				{
					if (event.ctrlKey) 
					{
						$("input[type='checkbox']").not(this).attr('checked', false);
						$(this).attr('checked', true);
					} 

					doOnTypeCheck();
				});

				$(".checkTitle").on("click", function(event)
				{
					var chkId = $(this).attr("chk_id");
					var chkBox = $('#' + chkId);

					if (event.ctrlKey) 
					{
						$("input[type='checkbox']").not(chkBox).attr('checked', false);
						$(chkBox).attr('checked', true);
					} 
					else
					{
						$(chkBox).attr('checked', !$(chkBox).attr('checked'));
					}

					doOnTypeCheck();
				});


				$("#lines").val(filterLines);
				
				if (location.search == null || location.search == "")
				{
					return;
				}
				
				try
				{
					var filters = getURLParameter("filter");
					var jsonStr = atob(filters);
					var json = JSON.parse(jsonStr);

					filterIp = json.ip;
					filterReq = json.req;
					filterReqId = json.reqid;
					filterTypes = json.types;
					filterFileId = "{{file}}";
					setCheckboxes();
					filter();
				}
				catch (err)
				{
				}
			});

			function getURLParameter(name)
			{
				return decodeURIComponent((new RegExp('[?|&]' + name + '=' + '([^&;]+?)(&|#|;|$)').exec(location.search)||[,""])[1].replace(/\+/g, '%20'))||null
			}
			
			function filter()
			{
				$("#content tr").show();
				
				if (filterIp != "")
				{
					var strIp = filterIp.replace(/\./g, "_").replace(/\:/g, "_");
					$("#content tr:not(.ip_" + strIp + ")").hide();
				}
				
				if (filterReq != "")
				{
					$("#content tr:not(.req_" + filterReq + ")").hide();
				}
				
				if (filterReqId != "")
				{
					$("#content tr:not(.reqid_" + filterReqId + ")").hide();
					$(".no_session").html("Clear Session");
					$(".no_session").addClass("has_session");
				}
				else
				{
					$(".no_session").html("No Session");
					$(".no_session").removeClass("has_session");
				}

				for (var i = 0; i < filterTypes.length; i++)
				{
					$("#content tr.type_" + filterTypes[i]).hide();
				}
				

				window.history.pushState(null, "", getUrl());
			}
			
			function getUrl()
			{
				var filterObj = new Object();
				filterObj.ip = filterIp;
				filterObj.req = filterReq;
				filterObj.reqid = filterReqId;
				filterObj.types = filterTypes;
				filterJson = btoa(JSON.stringify(filterObj));
				return location.protocol + '//' + location.host + location.pathname + "?filter=" + filterJson + "&limit=" + filterLines + (filterFileId == "" ? "" : "&file=" + btoa(filterFileId));
			}
		
			function doOnClick(cell, str)
			{
                if (window.getSelection().toString().length > 0)
                {
                    return;
                }

				switch (cell)
				{
					case 1:
						filterIp = str;
						$("#selectIp").val(filterIp);
					break;
					case 2:
						$("input[type='checkbox']").attr('checked', false);
						$("#chk_" + str).attr('checked', true);
					break;
					case 3:
						filterReq = str;
						$("#selectReq").val(filterReq);
					break;
					case 4:
						filterReqId = str;
					break;
				}
				
				setFilterTypes();
				filter();
			}
			
			function doOnTypeCheck()
			{
				doOnClick(0);
			}
			
			function doOnTypeAll(isAll)
			{
				$("input[type='checkbox']").attr('checked', isAll);
				doOnClick(0);
			}
			
			function doOnChangeIp()
			{
				var val = $("#selectIp").val();
				if (val == 0)
				{
					doOnClick(1, "");
				}
				else
				{
					doOnClick(1, val);
				}
			}
			
			function doOnChangeRequest()
			{
				var val = $("#selectReq").val();
				if (val == 0)
				{
					doOnClick(3, "");
				}
				else
				{
					doOnClick(3, val);
				}
			}
			
			function doOnChangeFile()
			{
				var val = $("#selectFile").val();
				if (val == 0)
				{
					filterFileId = "";
				}
				else
				{
					filterFileId = val;
				}

				doOnReload();
			}
			
			function doOnReload()
			{
				filterLines = $("#lines").val();
				location.href = getUrl();
			}
			
			function doOnReset()
			{
				doOnTypeAll(true);
				filterIp = "";
				filterReq = "";
				filterReqId = "";
				$("#selectIp").val(0);
				$("#selectReq").val(0);
				doOnClick(0);
			}
			
			function setFilterTypes()
			{
				filterTypes = new Array();

				if (!$("#chk_REQUEST").is(':checked'))		filterTypes.push("REQUEST");
				if (!$("#chk_RESPONSE").is(':checked'))		filterTypes.push("RESPONSE");
				if (!$("#chk_ERROR").is(':checked'))		filterTypes.push("ERROR");
				if (!$("#chk_WARNING").is(':checked'))		filterTypes.push("WARNING");
				if (!$("#chk_INFO").is(':checked'))			filterTypes.push("INFO");
				if (!$("#chk_DEBUG").is(':checked'))		filterTypes.push("DEBUG");
				if (!$("#chk_{{project}}").is(':checked'))	filterTypes.push("{{project}}");
			}
			
			function setCheckboxes()
			{
				$("input[type='checkbox']").attr('checked', true);

				if (filterTypes.indexOf("REQUEST") != -1)		$("#chk_REQUEST").attr('checked', false);
				if (filterTypes.indexOf("RESPONSE") != -1)		$("#chk_RESPONSE").attr('checked', false);
				if (filterTypes.indexOf("ERROR") != -1)			$("#chk_ERROR").attr('checked', false);
				if (filterTypes.indexOf("WARNING") != -1)		$("#chk_WARNING").attr('checked', false);
				if (filterTypes.indexOf("INFO") != -1)			$("#chk_INFO").attr('checked', false);
				if (filterTypes.indexOf("DEBUG") != -1)			$("#chk_DEBUG").attr('checked', false);
				if (filterTypes.indexOf("{{project}}") != -1)	$("#chk_{{project}}").attr('checked', false);
			}
			
			function clearSession()
			{
				filterReqId = "";
				doOnClick(0);
			}

			function doOnLogout()
			{
				if (!confirm("Are you sure you want to logout?"))
				{
					return;
				}

                $.ajax({
                        url: "{{api_url}}",
                        type: "POST",
                        data: JSON.stringify({"#request": "User/system_logout", "token": jQuery.cookie("system_token")}),
                        dataType: 'json',
                        headers: { 'Content-Type': 'application/json' },
                        success: function (json)
                        {
                            if (json.rc == undefined)
                            {
                                alert(JSON.stringify(json));
                                return;
                            }
                            if (json.rc != 0)
                            {
                                alert(json.message);
                                return;
                            }

            				jQuery.removeCookie("system_token");
                            window.location = "system_login/logtail";
                        },
                        error: function()
                        {
                            alert(arguments[0].responseText);
                        }
                });
			}

			function copyToClipboard(text)
			{
                if (window.getSelection().toString().length > 0)
                {
                    return;
                }

				if (navigator.clipboard)
				{
					navigator.clipboard.writeText(text)
					.then(() =>
					{
						showToast("Copied to clipboard!");
					})
					.catch(err =>
					{
						showToast("Failed to copy text", true);
					});
				}
				else
				{
					const textarea = document.createElement("textarea");
					textarea.value = text;
					document.body.appendChild(textarea);
					textarea.select();
					document.execCommand("copy");
					document.body.removeChild(textarea);
					showToast("Copied to clipboard!");
				}
			}

			function showToast(message, isErr = false)
			{
				const toast = document.createElement("div");
				toast.textContent = message;
				toast.style.position = "fixed";
				toast.style.bottom = "40px";
				toast.style.left = "50%";
				toast.style.transform = "translateX(-50%)";
				toast.style.background = (isErr ? "#A00000" : "#333333");
				toast.style.color = "#ffffff";
				toast.style.padding = "10px 20px";
				toast.style.borderRadius = "8px";
				toast.style.boxShadow = "0 2px 10px rgba(0,0,0,0.2)";
				toast.style.zIndex = "9999";
				toast.style.opacity = "0";
				toast.style.transition = "opacity 0.3s";

				document.body.appendChild(toast);

				// Fade in
				requestAnimationFrame(() =>
				{
					toast.style.opacity = "1";
				});

				// Remove after 1 second
				setTimeout(() =>
				{
					toast.style.opacity = "0";
					toast.addEventListener("transitionend", () =>
					{
						toast.remove();
					});
				}, 1000);
			}
		</script>
</head>
<body>
<div id="outer">
    <div id="inner_fixed">
		<div id="header">
			<table cellpadding="5" cellspacing="0" border="0">
				<tr><td colspan=3>{{getWebClientMessages}}{{getWebClientEnvironment}}</td></tr>
				<tr>
					<td>
						<div class="vspacer">&nbsp;</div>
						<input type="button" id="REFRESH" onclick="doOnReload()" value="REFRESH" />
						<input type="button" id="RESET" onclick="doOnReset()" value="RESET" />
					</td>
					<td>
						<div style="padding: 4px;">
							<div style="border: solid 1px black; padding: 8px;">
								Types:
								<input type="checkbox" id="chk_REQUEST" checked="checked" /><span chk_id="chk_REQUEST" class="checkTitle">Requests</span>
								<div class="spacer">&nbsp;</div>
								<input type="checkbox" id="chk_RESPONSE" checked="checked" /><span chk_id="chk_RESPONSE" class="checkTitle">Responses</span>
								<div class="spacer">&nbsp;</div>
								<input type="checkbox" id="chk_ERROR" checked="checked" /><span chk_id="chk_ERROR" class="checkTitle">Errors</span>
								<div class="spacer">&nbsp;</div>
								<input type="checkbox" id="chk_WARNING" checked="checked" /><span chk_id="chk_WARNING" class="checkTitle">Warnings</span>
								<div class="spacer">&nbsp;</div>
								<input type="checkbox" id="chk_INFO" checked="checked" /><span chk_id="chk_INFO" class="checkTitle">Info</span>
								<div class="spacer">&nbsp;</div>
								<input type="checkbox" id="chk_DEBUG" checked="checked" /><span chk_id="chk_DEBUG" class="checkTitle">Debug</span>
								<div class="spacer">&nbsp;</div>
								<div style="display: {{project_display}}">
									<input type="checkbox" id="chk_{{project}}" checked="checked" /><span chk_id="chk_{{project}}" class="checkTitle">{{project}}</span>
									<div class="spacer">&nbsp;</div>
								</div>
								<input type="button" id="chks_ALL" onclick="doOnTypeAll(true)" value="All" />
								<input type="button" id="chks_NONE" onclick="doOnTypeAll(false)" value="None" />
								<input type="button" id="logout" onclick="doOnLogout()" value="Logout" />
							</div>
						</div>
						<div class="vspacer">&nbsp;</div>
						<div style="padding: 4px;">
							<div style="border: solid 1px black; padding: 8px; display: inline;">
								Lines: <input type="text" id="lines" /> <input type="button" id="RELOAD" onclick="doOnReload()" value="Load" />
							</div>
							<div class="spacer">&nbsp;</div>
							<div style="border: solid 1px black; padding: 8px; display: inline;">
								IP: <select id="selectIp" onchange="doOnChangeIp()"><option value="0">--- Any ---</option></select>
							</div>
							<div class="spacer">&nbsp;</div>
							<div style="border: solid 1px black; padding: 8px; display: inline;">
								Request: <select id="selectReq" onchange="doOnChangeRequest()"><option value="0">--- Any ---</option></select>
							</div>
							<div class="spacer">&nbsp;</div>
							<div style="border: solid 1px black; padding: 8px; display: inline;" class="no_session" onclick="clearSession()">No Session</div>
							<div class="spacer">&nbsp;</div>
							<div style="border: solid 1px black; padding: 8px; display: inline;">
								File: <select id="selectFile" onchange="doOnChangeFile()">
										<option value="">--- Last ---</option>
										{{fileOptions}}
									</select>
							</div>
						</div>
					</td>
				</tr>
			</table>
			<hr />
		</div>
    </div>
 
    <div id="content">
		<table cellpadding="5" cellspacing="0" border="0">
			{{lines}}
		</table>
	</div>
</div>

				

	<script type="text/javascript">
		$(document).ready(function()
		{
			{{ipOptions}}
			{{reqOptions}}

			$("#selectIp").val(filterIp == "" ? 0 : filterIp);
			$("#selectReq").val(filterReq == "" ? 0 : filterReq);

			if (filterFileId != "")
			{
				$("#selectFile").val(filterFileId);
			}
		});
	</script>
</body>
</html>
