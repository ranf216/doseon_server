<!DOCTYPE html>
<html>
    <head>
		<title>{{system}} {{environment}} - System Login</title>
		<link rel="shortcut icon" href="/favicon.ico?src={{location}}" />
		<script type="text/javascript" src="/public/jquery-1.8.2.mini.js"></script>
		<script type="text/javascript" src="/public/jquery.cookie.js"></script>

		<style type="text/css">
			html, body {height: 100%; width: 100%; margin: 0;}
			.outer {height: 100%; width: 100%; margin: 150px 0px 0px 0px;}
            .inner {text-align: left; background: #a2d0e4; width: 500px; margin: auto; border: #0000A0 5px solid; border-radius: 10px; padding: 15px;}
            .title {font-size: 20px; font-family: Arial; font-weight: bold; color: #0000A0; padding-bottom: 25px;}
            .title span {text-decoration: underline;}
            td {font-size: 20px; font-family: Arial; font-weight: normal; color: #0000A0; padding-bottom: 15px; padding-right: 10px;}
            .input {font-size: 20px; font-family: Arial; font-weight: normal; color: #0000A0; width: 320px; border: #0000A0 1px solid; border-radius: 6px; padding-left: 10px; padding-right: 10px;}
            .submit {font-size: 20px; font-family: Arial; font-weight: bold; color: #0000A0; width: 160px; border: #0000A0 1px solid; border-radius: 6px;}
		</style>
		
		<script type="text/javascript">
			$(document).ready(function()
			{
                $("#name").focus();
			});

            function doLogin()
            {
                $.ajax({
                        url: "{{api_url}}",
                        type: "POST",
                        data: JSON.stringify({"#request": "User/system_login", "user_name": $("#name").val(), "password": $("#password").val()}),
                        dataType: 'json',
                        headers: { 'Content-Type': 'application/json' },
                        success: function (json)
                        {
                            if (json.rc == undefined)
                            {
                                alert(JSON.stringify(json));
                                return;
                            }
                            if (json.rc != 0)
                            {
                                alert(json.message);
                                return;
                            }

            				jQuery.cookie("system_token", json.token, {expires: 365, path: "/;SameSite=Lax", {{secure}}});
                            window.location = "/{{location}}";
                        },
                        error: function()
                        {
                            alert(arguments[0].responseText);
                        }
                });
            }
		</script>
    </head>
    <body>
        <div class="outer">
            <div class="inner">
                <form action="#" onsubmit="doLogin(); return false;">
                    <div class="title">System Login: <span>{{system}} {{environment}}</span></div>
                    <table>
                        <tr>
                            <td>User name:</td>
                            <td><input type="text" name="user" id="name" class="input" /></td>
                        </tr>
                        <tr>
                            <td>Password:</td>
                            <td><input type="password" name="password" id="password" class="input" /></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td><input type="submit" value="Login" class="submit" /></td>
                        </tr>
                    </table>
                </form>
            </div>
        </div>
    </body>
</html>
